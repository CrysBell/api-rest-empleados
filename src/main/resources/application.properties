spring.application.name=api-rest-empleados
#Configurar las credenciales de conexion a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/api-rest-empleados
spring.datasource.username=root
spring.datasource.password=Temp2026

# Para configurar el ORM Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

#Fileupload y Download
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# La siguiente clave (key) ofrece mas informacion por la consola respecto a las consultas
# o sentencias del SQL generadas por HIBERNATE
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.deserialization.fail-on-null-for-primitives=false